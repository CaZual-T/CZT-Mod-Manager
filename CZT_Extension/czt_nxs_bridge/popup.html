<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CZT Nexus Bridge</title>
    <style>
      :root {
        --bg: #000000;
        --panel: #16181b;
        --text: #f3f5f7;
        --muted: #adb6be;
        --accent: #9b0000;
      }
      body {
        margin: 0;
        font-family: Segoe UI, Tahoma, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-width: 360px;
      }
      .wrap {
        padding: 12px;
      }
      .card {
        background: var(--panel);
        border-radius: 10px;
        padding: 10px;
      }
      .title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .row {
        font-size: 12px;
        margin: 3px 0;
        color: var(--muted);
        word-break: break-word;
      }
      .row strong {
        color: var(--text);
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .actions-launch {
        margin-bottom: 8px;
      }
      button {
        flex: 1;
        border: none;
        border-radius: 8px;
        padding: 8px;
        background: #2a323c;
        color: var(--text);
        cursor: pointer;
      }
      button.primary {
        background: var(--accent);
        color: #0f1215;
        font-weight: 700;
      }
      .toggle {
        margin-top: 10px;
        font-size: 12px;
      }
      .status {
        margin-top: 8px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="title">Most Recent Download</div>
        <div id="emptyState" class="row">No downloads captured yet.</div>
        <div id="eventState" style="display:none;">
          <div class="row"><strong>Game:</strong> <span id="game"></span></div>
          <div class="row"><strong>Mod:</strong> <span id="modName"></span></div>
          <div class="row"><strong>Mod ID:</strong> <span id="modId"></span></div>
          <div class="row"><strong>File ID:</strong> <span id="fileId"></span></div>
          <div class="row"><strong>Method:</strong> <span id="buttonText"></span></div>
          <div class="row"><strong>Time:</strong> <span id="time"></span></div>
        </div>
        <div class="actions actions-launch">
          <button id="launchNow" class="primary">Launch CZT Mod Manager</button>
        </div>
        <label class="toggle">
          <input id="protocolEnabled" type="checkbox" />
          Enable CZT protocol
        </label>
        <div id="status" class="status"></div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
